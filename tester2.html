<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-secondary">
    <div class="container mt-5">
        <form>
            <div class="mb-3">
                <p class="h2 text-dark">Formularz kwalifikacyjny - Tester oprogramowania</p>
                <p class="text-dark">Wypełnij poniższy formularz, aby się zakwalifikować</p>
             </div>
             <p class="fw-bold">5.Wykształcenie i doświadczenie </p>
            <div class="mb-3">
                <label class="form-label" for="education">Jakie masz wykształcenie?</label>
                <input type="text" class="form-control" id="education" placeholder="Np. wyższe, policealne...">
            </div>
            <div class="mb-3">
                <label class="form-label" for="itEducation">Czy posiadasz wykształcenie informatyczne?</label>
                <select class="form-select" id="itEducation">
                    <option value="">Wybierz...</option>
                    <option value="tak">Tak</option>
                    <option value="nie">Nie</option>
                </select>
            </div>
            <div class="mb-3" id="itEducationDetails" style="display: none;">
                <label class="form-label" for="itDegree">Jeśli tak, jakie jest to wykształcenie informatyczne?</label>
                <input type="text" class="form-control" id="itDegree" placeholder="Np. informatyka, inżynieria oprogramowania...">
            </div>
            <div class="mb-3">
                <label class="form-label" for="experienceYears">Ile lat doświadczenia masz w testowaniu oprogramowania?</label>
                <input type="number" class="form-control" id="experienceYears" min="0" placeholder="Liczba lat">
            </div>
            <div class="mb-3">
                <label class="form-label" for="previousRoles">Na jakich stanowiskach pracowałeś wcześniej?</label>
                <textarea class="form-control" id="previousRoles" rows="3" placeholder="Wymień swoje poprzednie role"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label" for="certificates">Czy posiadasz certyfikaty związane z testowaniem? Jeśli tak, jakie?</label>
                <textarea class="form-control" id="certificates" rows="2" placeholder="Wypisz certyfikaty"></textarea>
            </div>
            <div class="mb-3">
                <p class="fw-bold">6.Umiejętności techniczne</p><br>
                <label class="form-label" for="testingTypes">Jakie rodzaje testowania znasz?</label>
                <input type="text" class="form-control" id="testingTypes" placeholder="Np. funkcjonalne, niefunkcjonalne, automatyczne...">
                <label class="form-label mt-3" for="tools">Jakie narzędzia testerskie znasz?</label>
                <input type="text" class="form-control" id="tools" placeholder="Np. Selenium, JIRA, Postman...">
                <label class="form-label mt-3" for="methodologies">Jakie metodologie testowania stosujesz?</label>
                <input type="text" class="form-control" id="methodologies" placeholder="Np. Agile, Waterfall, TDD...">
                <label class="form-label mt-3" for="languages">Jakie języki programowania znasz (w kontekście automatyzacji testów)?</label>
                <input type="text" class="form-control" id="languages" placeholder="Np. Java, Python, JavaScript...">
            </div><br><br><br><br>
    <ul class="pagination justify-content-center">
            <li class="page-item"><a class="page-link" href="Tester oprogramowania.html">1</a></li>
            <li class="page-item"><a class="page-link" href="tester2.html">2</a></li>
            </ul>
        </form>
    </div>

</body>
</html>
