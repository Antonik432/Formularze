<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-secondary">
    <div class="container mt-5">
        <form>
            <div class="mb-3">
                <p class="h2 text-dark">Formularz kwalifikacyjny - Administrator Sieciowy</p>
                <p class="text-dark">Wypełnij poniższy formularz, aby się zakwalifikować</p>
             </div>
             <p class="fw-bold">4.Wykształcenie i certyfikaty</p><br>
            <div class="mb-3">
                <label class="form-label" for="education">Wykształcenie (uczelnia / kierunek)</label>
                <input type="text" class="form-control" id="education" placeholder="Wpisz swoją uczelnię i kierunek">
            </div>
            <div class="mb-3">
                <label class="form-label" for="courses">Ukończone kursy lub szkolenia IT</label>
                <textarea class="form-control" id="courses" rows="3" placeholder="Wymień ukończone kursy lub szkolenia"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label" for="certificates">Czy posiadasz certyfikaty sieciowe (np. Cisco, CompTIA)? Jeśli tak – jakie?</label>
                <textarea class="form-control" id="certificates" rows="2" placeholder="Wymień posiadane certyfikaty"></textarea>
            </div>
            <p class="fw-bold">5.Doświadczenie zawodowe</p><br>
            <div class="mb-3">
                <label class="form-label" for="experienceYears">Ile lat doświadczenia masz w administracji sieciami?</label>
                <input type="number" class="form-control" id="experienceYears" min="0" placeholder="Liczba lat">
            </div>
            <div class="mb-3">
                <label class="form-label" for="previousRoles">Na jakim stanowisku pracowałeś wcześniej?</label>
                <textarea class="form-control" id="previousRoles" rows="3" placeholder="Wymień swoje poprzednie stanowiska"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label" for="systems">Jakimi systemami lub infrastrukturą sieciową zarządzałeś?</label>
                <textarea class="form-control" id="systems" rows="3" placeholder="Wymień zarządzane systemy i infrastrukturę"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label" for="project">Opisz krótko projekt sieciowy, w którym brałeś udział.</label>
                <textarea class="form-control" id="project" rows="4" placeholder="Opisz projekt"></textarea>
            </div><br><br><br><br>
             <ul class="pagination justify-content-center">
            <li class="page-item"><a class="page-link" href="admin.html">1</a></li>
            <li class="page-item"><a class="page-link" href="admin2.html">2</a></li>
</ul>
        </form>
    </div>
</body>
</html>
