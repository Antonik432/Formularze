<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-secondary">
    <div class="container mt-5">
        <form>
            <div class="mb-3">
                <p class="h2 text-dark">Formularz kwalifikacyjny - Tester oprogramowania</p>
                <p class="text-dark">Wypełnij poniższy formularz, aby się zakwalifikować</p>
             </div>
                <p class="fw-bold">1.Dane osobowe</p><br>
            <div class="mb-3">
                <label for="name" class="form-label">Imię</label>
                <input type="text" class="form-control" id="name" placeholder="Wpisz swoje imię">
            </div>
            <div class="mb-3">
                <label for="surname" class="form-label">Nazwisko</label>
                <input type="text" class="form-control" id="surname" placeholder="Wpisz swoje nazwisko">
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="Wpisz swój email">
            </div>
            <div class="mb-3">
                <p class="fw-bold">2.Dane kontaktowe</p><br>
                <label for="phone" class="form-label">Numer telefonu</label>
                <input type="tel" class="form-control" id="phone" placeholder="Wpisz swój numer telefonu">
                <label for="e-mail" class="form-label">Adres email</label>
                <input type="email" class="form-control" id="e-mail" placeholder="Wpisz swój adres email">
            </div>
            <p class="fw-bold">3.Adres zamieszkania</p><br>
            <div class="mb-3">
                <label for="street" class="form-label">Ulica</label>
                <input type="text" class="form-control" id="street" placeholder="Wpisz swoją ulicę">
                <label for="city" class="form-label">Miasto</label>
                <input type="text" class="form-control" id="city" placeholder="Wpisz swoje miasto">
                <label for="postal-code" class="form-label">Kod pocztowy</label>
                <input type="text" class="form-control" id="postal-code" placeholder="Wpisz swój kod pocztowy">
            </div>
            <p class="fw-bold">4.Doświadczenie zawodowe</p><br>
                <div class="mb-3">
                <label for="experience" class="form-label">Opisz swoje doświadczenie zawodowe związane z testowaniem oprogramowania</label>
                <textarea class="form-control" id="experience" rows="5" placeholder="Opisz swoje doświadczenie zawodowe związane z testowaniem oprogramowania"></textarea>
            </div>
            <ul class="pagination justify-content-center">
            <li class="page-item"><a class="page-link" href="Tester oprogramowania.html">1</a></li>
            <li class="page-item"><a class="page-link" href="tester2.html">2</a></li>
            </ul>
        </form>
</body>
</html>
